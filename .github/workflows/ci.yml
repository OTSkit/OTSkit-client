name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test on Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - name: "Clone otskit-core (file: dependency)"
        run: git clone https://github.com/OTSkit/OTSkit-core.git ../otskit-core
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Build otskit-core
        run: cd ../otskit-core && npm install && npm run build
      - run: npm install
      - run: npm run lint --if-present
      - run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: "Clone otskit-core (file: dependency)"
        run: git clone https://github.com/OTSkit/OTSkit-core.git ../otskit-core
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Build otskit-core
        run: cd ../otskit-core && npm install && npm run build
      - run: npm install
      - run: npm run build
      - run: |
          test -f dist/index.js
          test -f dist/index.cjs
          test -f dist/index.d.ts

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: "Clone otskit-core (file: dependency)"
        run: git clone https://github.com/OTSkit/OTSkit-core.git ../otskit-core
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
      - name: Build otskit-core
        run: cd ../otskit-core && npm install && npm run build
      - run: npm install
      - run: npm run build
      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
